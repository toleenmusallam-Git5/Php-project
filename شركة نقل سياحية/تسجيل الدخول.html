<!DOCTYPE html>
<html >
<head>
  <meta charset="UTF-8">
  <title>شركة الرفاه للنقل</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      direction: rtl;
      background-color: #f5f5f5;
    } 
	 .hero-image {
	
     width: 100%;
  height:600px;
  background-image: url('تسجيل.png'); 
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  position: relative;
  z-index: 1;
    }
	.box {
   background-color: white;
      border-radius: 10px;
	  height:400px;
      width: 250px;
      box-shadow: 50px 50px 50px rgba(0,0,0,0.1);
      text-align: center;
      padding: 15px;
	    margin: 0 auto;
		  position:absolute;
		  top:100px;
		  left:40%;}
		  .form-page {
    display: none;
  }

  .form-page.active {
    display: block;
  }

  .input1 {
    display: flex;
    width: 240px;
    padding: 10px;
    margin-bottom: 1rem;
    border-radius: 5px;
   border-color:#2e7d32;
	 border-width:1px;
	 position:absolute;
		  top:190px;
		  left:8px;
  }
  
   .input2 {
    display: flex;
    width: 240px;
    padding: 10px;
    margin-bottom: 1rem;
    border-radius: 5px;
   border-color:#2e7d32;
	 border-width:1px;
	 position:absolute;
		  top:260px;
		  left:8px;
  }

  .next-arrow {
    font-size: 22px;
    color: #000;
    position: absolute;
    bottom: 20px;
    right: 20px;
    cursor: pointer;
  }

  .google-btn {
     background-color: white;
	 border-color:#2e7d32;
	 border-width:1px;
    color:  #2e7d32;
    padding: 10px;
    width: 260px;
    border-radius: 5px;
    cursor: pointer;
	 position:absolute;
		  top:320px;
		  left:10.5px;
		  
		
     
		  
	
	}
	.back-arrow {
  font-size: 22px;
  color: #000; 
  position: absolute;
 top: 20px;
  left: 20px;
  cursor: pointer;
}

.login-btn {
   
    background-color: #2e7d32;
    color: white;
    border: none;
    padding: 10px;
    width: 80px; 
	height:40px;
    border-radius: 10px;
    cursor: pointer;
	position:absolute;
	bottom: 17px;
    right: 98px;
	text-align:center;
	font-size:20px;
	   
   
	 
	}
  </style>
</head>
<body>
 <div class="hero-image">
 
 <div class="box">
 
 
 
 <div style="text-align: center; margin-bottom: 1.5rem;">
  <img src="123.png" alt="شعار شركة الرفاه" style="width: 130px;position:absolute;top:0px;left:20px;" />
  <h2 style="position:absolute;top:30px;left:150px; color: #000;">شركة الرفاه</h2>
</div>

<div id="page1" class="form-page active">
  
 <h3  style="position:absolute;top:130px;left:70px;"> معلوماتك الأساسية </h3>
  <input type="text" placeholder="الاسم الكامل" class="input1" />
  <input type="tel" placeholder="                                                رقم الهاتف" class="input2" />
  <span  class="next-arrow" onclick="showPage(2)" /><img src="سهم.jpg" width=20px alt="سهم "></span>
</div>


<div id="page2" class="form-page">
  <h3  style="position:absolute;top:130px;left:90px;">تسجيل الدخول</h3>
  <input type="email" placeholder="البريد الإلكتروني"  class="input1" />
  <input type="password" placeholder="كلمة المرور"  class="input2" />
  <button class="google-btn">تسجيل الدخول بحساب Google</button>
  <span class="back-arrow" onclick="showPage(1)" title="الرجوع"><img src="سهم2.jpg" width=20px alt="سهم "></span>
  
  <button class="login-btn" onclick="location.href='شركة.html'">تسجيل</button>
  
</div>

 
 </div>
 
 
 </div>
 <script>
  function showPage(pageNumber) {
    document.querySelectorAll('.form-page').forEach(page => {
      page.classList.remove('active');
    });
    document.getElementById('page' + pageNumber).classList.add('active');
  }
</script>
</body>
</html>
